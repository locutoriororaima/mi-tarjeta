<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Multiservicios Roraima - Mungia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1a56db;
    --blue-light: #e8efff;
    --blue-mid: #3b6fd4;
    --dark: #0f172a;
    --mid: #334155;
    --soft: #64748b;
    --line: #e2e8f0;
    --bg: #f8fafc;
    --white: #ffffff;
    --accent: #0ea5e9;
    --success: #22c55e;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Epilogue', sans-serif;
    color: var(--dark);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  /* HEADER BAND */
  .header-band {
    width: 100%;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a6e 60%, #1a56db 100%);
    padding: 48px 24px 80px;
    position: relative;
    overflow: hidden;
  }

  .header-band::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .header-band::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(14,165,233,0.12);
  }

  .dots-pattern {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  .header-content {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
  }

  /* AVATAR */
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 18px;
    animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.3);
    display: block;
    background: linear-gradient(135deg, #1a56db, #0ea5e9);
  }

  .avatar-badge {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 22px; height: 22px;
    background: #22c55e;
    border: 2px solid white;
    border-radius: 50%;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 1.7rem;
    font-weight: 800;
    color: white;
    line-height: 1.1;
    margin-bottom: 6px;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-weight: 400;
    line-height: 1.5;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  /* CARD FLOAT */
  .card-float {
    background: var(--white);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(15,23,42,0.12), 0 4px 16px rgba(15,23,42,0.06);
    width: calc(100% - 40px);
    max-width: 440px;
    margin: -44px auto 0;
    position: relative;
    z-index: 10;
    overflow: hidden;
    animation: slideUp 0.6s ease 0.2s both;
  }

  /* CONTACT ITEMS */
  .contact-list {
    padding: 8px 0;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    text-decoration: none;
    color: var(--dark);
    border-bottom: 1px solid var(--line);
    transition: background 0.15s;
    animation: fadeUp 0.4s ease both;
  }

  .contact-item:last-child { border-bottom: none; }
  .contact-item:hover { background: var(--bg); }

  .item-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .icon-phone  { background: #dcfce7; }
  .icon-wa     { background: #dcfce7; }
  .icon-email  { background: #fef9c3; }
  .icon-web    { background: #e0f2fe; }
  .icon-map    { background: #fce7f3; }
  .icon-ig     { background: #fce7f3; }
  .icon-fb     { background: #dbeafe; }

  .item-info { flex: 1; min-width: 0; }

  .item-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--soft);
    margin-bottom: 2px;
  }

  .item-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-arrow {
    color: var(--line);
    font-size: 16px;
    flex-shrink: 0;
  }

  /* CTA BUTTON */
  .cta-btn {
    display: block;
    width: calc(100% - 40px);
    max-width: 440px;
    margin: 16px auto 0;
    padding: 16px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(34,197,94,0.3);
    animation: fadeUp 0.5s ease 0.35s both;
  }

  .cta-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .cta-btn:active { transform: translateY(0); }

  /* SAVE VCARD */
  .save-btn {
    display: block;
    width: calc(100% - 40px);
    max-width: 440px;
    margin: 8px auto 0;
    padding: 12px;
    background: var(--bg);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    color: var(--mid);
    font-family: 'Epilogue', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s;
    animation: fadeUp 0.5s ease 0.4s both;
  }

  .save-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

  /* SOCIAL GRID */
  .social-section {
    width: calc(100% - 40px);
    max-width: 440px;
    margin: 16px auto 0;
  }

  .social-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--soft);
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .social-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }

  .social-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 8px;
    background: white;
    border-radius: 14px;
    border: 1px solid var(--line);
    text-decoration: none;
    color: var(--mid);
    font-size: 11px;
    font-weight: 500;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .social-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(26,86,219,0.12);
  }

  .social-btn span { font-size: 22px; }

  /* FOOTER */
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--soft);
    opacity: 0.7;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="header-band">
  <div class="dots-pattern"></div>
  <div class="header-content">
    <div class="avatar-wrap">
      <img src="https://raw.githubusercontent.com/locutoriororaima/mi-tarjeta/main/Foto-perfil.jpg" alt="Roraima" class="avatar">
      <div class="avatar-badge"></div>
    </div>
    <div class="name">Multiservicios Roraima</div>
    <div class="tagline">Alimentación Latina · Envíos de Dinero · Punto de Paquetería</div>
  </div>
</div>

<div class="card-float">
  <div class="contact-list" id="contactList">
    </div>
</div>

<a class="cta-btn" id="mainCta" href="#" target="_blank">
  💶 Precio del Euro
</a>

<a class="save-btn" id="saveVcard" href="#" style="display:none">
  ＋ Guardar Contacto
</a>

<div class="social-section" id="socialSection" style="display:none">
  <div class="social-title">Síguenos</div>
  <div class="social-grid" id="socialGrid"></div>
</div>

<div class="footer">Tarjeta Digital Empresarial</div>

<script>
// ════════════════════════════════════════════════════════════
// DATOS REALES DE RORAIMA — ACTUALIZADOS E INTEGRADOS
// ════════════════════════════════════════════════════════════
const DATA = {
  nombre:     "Multiservicios Roraima",
  tagline:    "Alimentación Latina · Envíos de Dinero · Punto de Paquetería",
  telefono:   "+34 643 901 309",
  whatsapp:   "34643901309",
  email:      "locutorio.roraima@gmail.com",
  website:    "https://locutoriororaima.wixsite.com/roraima/tienda",
  cotizaciones: "https://locutoriororaima.wixsite.com/roraima/cotizaciones",
  direccion:  "Zubiaga Kalea, 4, 48100 Mungia, Bizkaia",
  instagram:  "multiserviciosroraimamungia",
  facebook:   "locutorio.roraima",
  clima:      "clima.html",
  
  // Mensaje gancho optimizado que despierta al bot automático
  whatsappMsg: "Hola Roraima, quiero consultar el precio del Euro o gestionar un paquete."
};
// ════════════════════════════════════════════════════════════

function buildPage() {
  // Configurar el botón verde de acción principal (CTA) hacia la landing de cotizaciones
  document.getElementById('mainCta').href = DATA.cotizaciones;

  // Lista de contacto con enlaces de acción corregidos
  const contacts = [
    { 
      icon: '📞', cls: 'icon-phone', label: 'Teléfono', 
      value: DATA.telefono, 
      href: `tel:${DATA.telefono.replace(/\s+/g, '')}` 
    },
    { 
      icon: '<img src="whatsapp.png" alt="" style="width:24px; height:24px; vertical-align:middle; display:inline-block;">', cls: 'icon-wa',  
      label: 'WhatsApp',
      value: "Pincha aquí",
      href: `https://wa.me/${DATA.whatsapp}?text=${encodeURIComponent(DATA.whatsappMsg)}` 
    },
    { 
      icon: '<img src="gmail.png" alt="" style="width:24px; height:24px; vertical-align:middle; display:inline-block;">', cls: 'icon-email', 
      label: 'Gmail', 
      value: DATA.email, 
      href: `mailto:${DATA.email}` 
    },
    { 
      icon: '🌐', cls: 'icon-web', label: 'Sitio Web', 
      value: "Tienda OnLine",
      href: DATA.website 
    },
    { 
      icon: '📍', cls: 'icon-map', label: 'Dirección', 
      value: "Zubiaga Kalea, 4 Mungia", 
      href: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent('Multiservicios Roraima Mungia')}` 
    }
    { 
       icon: '🌦️', cls: 'icon-map', label: 'Clima', 
       value: "Consulta el clima", 
       href: `https://locutoriororaima.github.io/mi-tarjeta/clima.html` 
     }
  ];

  const list = document.getElementById('contactList');
  contacts.forEach((c, i) => {
    const a = document.createElement('a');
    a.href = c.href;
    a.target = '_blank';
    a.className = 'contact-item';
    a.style.animationDelay = `${0.1 + i * 0.07}s`;
    a.innerHTML = `
      <div class="item-icon ${c.cls}">${c.icon}</div>
      <div class="item-info">
        <div class="item-label">${c.label}</div>
        <div class="item-value">${c.value}</div>
      </div>
      <div class="item-arrow">›</div>`;
    list.appendChild(a);
  });

  // vCard para guardar contacto sin caracteres de escape dañados
  const vcard = buildVCard();
  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const btn = document.getElementById('saveVcard');
  btn.href = url;
  btn.download = `Roraima-Mungia.vcf`;
  btn.style.display = 'block';

  // Redes sociales vinculadas de forma nativa
  const socials = [
    { 
      icon: '<img src="instagram.png" alt="" style="width:24px; height:24px; vertical-align:middle; display:inline-block;">', 
      label: 'Instagram', 
      href: `https://www.instagram.com/${DATA.instagram}` 
    },
    { 
      icon: '<img src="facebook.png" alt="" style="width:24px; height:24px; vertical-align:middle; display:inline-block;">', 
      label: 'Facebook',  
      href: `https://www.facebook.com/${DATA.facebook}`
    }
  ];


  document.getElementById('socialSection').style.display = 'block';
  const grid = document.getElementById('socialGrid');
  socials.forEach(s => {
    const a = document.createElement('a');
    a.href = s.href;
    a.target = '_blank';
    a.className = 'social-btn';
    a.innerHTML = `<span>${s.icon}</span>${s.label}`;
    grid.appendChild(a);
  });
}

function buildVCard() {
  const lines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `FN:${DATA.nombre}`,
    `TEL;TYPE=VOICE:${DATA.telefono}`,
    `TEL;TYPE=CELL:+${DATA.whatsapp}`,
    `EMAIL:${DATA.email}`,
    `URL:${DATA.website}`,
    `ADR;TYPE=WORK:;;${DATA.direccion};;;;`,
    `NOTE:${DATA.tagline}`,
    'END:VCARD'
  ];
  return lines.join('\r\n');
}

// Ejecutar la renderización de la página
buildPage();
</script>
</body>
</html>
