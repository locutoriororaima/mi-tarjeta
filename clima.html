<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima — Multiservicios Roraima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sky:    #0ea5e9;
      --sky-d:  #0284c7;
      --night:  #0c1220;
      --card:   #131e2e;
      --card2:  #1a2840;
      --border: rgba(255,255,255,0.07);
      --text:   #e2eaf4;
      --muted:  #7a90a8;
      --radius: 16px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--night);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(14,165,233,0.15) 0%, transparent 70%);
    }
    .wrap { width: 100%; max-width: 420px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header .icon {
      width: 52px; height: 52px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--sky), var(--sky-d));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .header .icon svg { width: 28px; height: 28px; fill: white; }
    .header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
    .header p  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .search-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .input-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--sky); }
    button {
      background: var(--sky);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 11px 18px;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button:hover  { background: var(--sky-d); }
    button:active { transform: scale(0.97); }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79zM1 10.5h3v2H1zM11 .55h2V3.5h-2zm8.04 2.495l1.408 1.407-1.79 1.79-1.407-1.408zm-1.8 15.115l1.79 1.8 1.41-1.41-1.8-1.79zM20 10.5h3v2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm-1 4h2v2.95h-2zm-7.45-.96l1.41 1.41 1.79-1.8-1.41-1.41z"/>
      </svg>
    </div>
    <h1>Consulta de Clima</h1>
    <p>Multiservicios Roraima</p>
  </div>

  <div class="search-card">
    <div class="input-row">
      <input type="text" id="ciudad" placeholder="Ciudad (ej: Caracas, Madrid...)"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button onclick="consultar()">Ver clima</button>
    </div>
    <p class="hint">El resultado abre en una nueva pestaña y se guarda en Sheets automáticamente.</p>
  </div>

</div>
<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYloNm61b2Ip1LsYiVteNOmD9n2EJjcMSAdYRtc7LkUiSV0xyp-Z8dbW59wXEdMe8/exec";

  document.getElementById("ciudad").addEventListener("keydown", function(e) {
    if (e.key === "Enter") consultar();
  });

  function consultar() {
    var ciudad = document.getElementById("ciudad").value.trim();
    if (!ciudad) return;
    window.open(SCRIPT_URL + "?ciudad=" + encodeURIComponent(ciudad), "_blank");
  }
</script>
</body>
</html>
